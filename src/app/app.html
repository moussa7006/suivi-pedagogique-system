<div class="layout-wrapper" [class.no-sidebar]="!showSidebar">
  
  <div class="layout-sidebar" *ngIf="showSidebar">
    <div class="sidebar-logo">
      <span>PEDAGO-SUIVI</span>
    </div>
    <ul class="sidebar-menu">
      <li routerLink="/dashboard" routerLinkActive="active">
        <i class="pi pi-th-large"></i> <span>Tableau de bord</span>
      </li>
      <li routerLink="/teachers" routerLinkActive="active">
        <i class="pi pi-users"></i> <span>Enseignants</span>
      </li>
      <li routerLink="/qr-generator" routerLinkActive="active">
        <i class="pi pi-qrcode"></i> <span>Générer QR Code</span>
      </li>
      <li routerLink="/attendance" routerLinkActive="active">
        <i class="pi pi-check-square"></i> <span>Emargements</span>
      </li>
      <li routerLink="/pedagogy" routerLinkActive="active">
        <i class="pi pi-book"></i> <span>Cahiers de textes</span>
      </li>
    </ul>
    
    <div class="sidebar-footer">
       <div class="logout-btn" (click)="logout()">
          <i class="pi pi-power-off"></i> <span>Déconnexion</span>
       </div>
    </div>
  </div>

  <div class="layout-main">
    <div class="layout-topbar" *ngIf="showSidebar">
      <div class="topbar-search">
        <i class="pi pi-search"></i>
        <input type="text" placeholder="Rechercher...">
      </div>
      <div class="topbar-actions">
        <i class="pi pi-bell notification-badge"></i>
        <div class="user-profile">
          <img src="https://ui-avatars.com/api/?name=Admin+Mali&background=007bff&color=fff" alt="Profile">
          <span>Admin Mali</span>
        </div>
      </div>
    </div>
    
    <div class="layout-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
