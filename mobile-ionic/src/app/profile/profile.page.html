<ion-content [fullscreen]="true">
  <!-- Bouton Retour -->
  <ion-button fill="clear" class="back-btn" routerLink="/tabs/tabs/tab1">
    <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
  </ion-button>

  <!-- Header Dynamique -->
  <div class="profile-header-container">
    <div class="avatar-container">
      <div class="avatar-edit-wrapper">
        <ion-avatar>
          <img [src]="teacher.avatar" [alt]="teacher.firstName" />
        </ion-avatar>
        <button class="edit-photo-btn" (click)="changePhoto()">
          <ion-icon name="camera-outline"></ion-icon>
        </button>
      </div>
      <div class="online-indicator"></div>
    </div>
    <h2>{{ teacher.firstName }} {{ teacher.lastName }}</h2>
    <div class="matricule-badge">ID: {{ teacher.matricule }}</div>
  </div>

  <div class="profile-section">
    <!-- Profil Enseignant (Détails) -->
    <div class="modern-card">
      <div class="card-header">
        <ion-icon name="person-circle-outline"></ion-icon>
        <h3>Profil Enseignant</h3>
      </div>
      <div class="info-grid">
        <div class="info-item">
          <div class="icon-box">
            <ion-icon name="person-outline"></ion-icon>
          </div>
          <div class="item-content">
            <label>Nom Complet</label>
            <p>{{ teacher.firstName }} {{ teacher.lastName }}</p>
          </div>
        </div>
        <div class="info-item">
          <div class="icon-box">
            <ion-icon name="mail-outline"></ion-icon>
          </div>
          <div class="item-content">
            <label>Email</label>
            <p>{{ teacher.email }}</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Sécurité & Préférences -->
    <div class="modern-card">
      <div class="card-header">
        <ion-icon name="shield-checkmark-outline"></ion-icon>
        <h3>Sécurité & Appli</h3>
      </div>
      <div class="info-grid">
        <div class="info-item">
          <div class="icon-box">
            <ion-icon name="lock-closed-outline"></ion-icon>
          </div>
          <div class="item-content">
            <div class="label-with-icon">
              <label>Mot de passe</label>
              <ion-icon 
                name="create-outline" 
                class="edit-icon-direct"
                (click)="openPasswordModal()"
              ></ion-icon>
            </div>
            <p>••••••••••••</p>
          </div>
        </div>
        <div class="info-item">
          <div class="icon-box">
            <ion-icon name="notifications-outline"></ion-icon>
          </div>
          <div class="item-content">
            <label>Notifications</label>
            <p>Activées</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL DE CHANGEMENT DE MOT DE PASSE (COMPACT) -->
  <ion-modal [isOpen]="isPasswordModalOpen" (ionModalDidDismiss)="isPasswordModalOpen = false" class="password-modal-compact">
    <ng-template>
      <div class="modal-compact-container">
        <div class="drag-handle"></div>
        <div class="modal-compact-header">
          <h2>Modifier le mot de passe</h2>
          <ion-button fill="clear" (click)="isPasswordModalOpen = false" class="btn-close-compact">
            <ion-icon name="close-outline"></ion-icon>
          </ion-button>
        </div>

        <div class="compact-form">
          <div class="compact-input-group">
            <ion-icon name="lock-closed-outline" class="start-icon"></ion-icon>
            <ion-input [type]="showOldPassword ? 'text' : 'password'" placeholder="Ancien mot de passe"></ion-input>
            <ion-icon 
              [name]="showOldPassword ? 'eye-off-outline' : 'eye-outline'" 
              class="eye-icon"
              (click)="showOldPassword = !showOldPassword"
            ></ion-icon>
          </div>
          
          <div class="compact-input-group">
            <ion-icon name="key-outline" class="start-icon"></ion-icon>
            <ion-input [type]="showNewPassword ? 'text' : 'password'" placeholder="Nouveau mot de passe"></ion-input>
            <ion-icon 
              [name]="showNewPassword ? 'eye-off-outline' : 'eye-outline'" 
              class="eye-icon"
              (click)="showNewPassword = !showNewPassword"
            ></ion-icon>
          </div>
          
          <div class="compact-input-group">
            <ion-icon name="checkmark-circle-outline" class="start-icon"></ion-icon>
            <ion-input [type]="showConfirmPassword ? 'text' : 'password'" placeholder="Confirmer le mot de passe"></ion-input>
            <ion-icon 
              [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'" 
              class="eye-icon"
              (click)="showConfirmPassword = !showConfirmPassword"
            ></ion-icon>
          </div>
          
          <ion-button expand="block" class="btn-save-compact" (click)="updatePassword()">
            Enregistrer les modifications
          </ion-button>
        </div>
      </div>
    </ng-template>
  </ion-modal>

  <!-- Bouton Déconnexion -->
  <div class="logout-btn-container">
    <ion-button
      expand="block"
      fill="outline"
      (click)="logout()"
      class="modern-logout-btn"
    >
      <ion-icon slot="start" name="log-out-outline"></ion-icon>
      Déconnexion de l'Espace
    </ion-button>
  </div>
</ion-content>
