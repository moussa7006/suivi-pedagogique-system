<ion-content class="login-content" [fullscreen]="true">
  <div class="login-container">
    <!-- Branding Section -->
    <div class="brand-section animate-fade-in">
      <div class="logo-container">
        <ion-icon name="key-outline"></ion-icon>
      </div>
      <h1>Mot de passe oublié</h1>
      <p>Entrez votre email pour recevoir un code</p>
    </div>

    <!-- Glass Form Card -->
    <div class="form-card animate-slide-up">
      <div class="form-header">
        <h2>Récupération 🔐</h2>
      </div>

      <form (ngSubmit)="submit()">
        <div class="input-wrapper">
          <ion-item lines="none">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-input
              name="email"
              [(ngModel)]="email"
              type="email"
              placeholder="Email professionnel"
              required
            ></ion-input>
          </ion-item>
        </div>

        <ion-button
          expand="block"
          type="submit"
          [disabled]="isLoading || !email"
          class="btn-login"
        >
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
          <span *ngIf="!isLoading">Recevoir le code</span>
        </ion-button>
      </form>

      <ion-button fill="clear" size="small" routerLink="/reset-password">
        J’ai déjà un code
      </ion-button>
      <ion-button
        fill="clear"
        size="small"
        type="button"
        (click)="goToLogin()"
        class="back-login-btn"
      >
        <ion-icon name="arrow-back-outline" slot="start"></ion-icon>
        Retour à la connexion
      </ion-button>
    </div>

    <!-- Minimal Footer -->
    <div class="university-footer animate-fade-in">
      <p>© 2026 Université du Mali</p>
    </div>
  </div>
</ion-content>
