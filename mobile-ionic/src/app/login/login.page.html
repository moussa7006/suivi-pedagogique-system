<ion-content class="login-content" [fullscreen]="true">
  <div class="login-container">
    <!-- Branding Section -->
    <div class="brand-section animate-fade-in">
      <div class="logo-container">
        <ion-icon name="school-outline"></ion-icon>
      </div>
      <h1>Suivi Pro</h1>
      <p>Espace Enseignants & Pédagogie</p>
    </div>

    <!-- Glass Form Card -->
    <div class="form-card animate-slide-up">
      <div class="form-header">
        <h2>Bienvenue 👋</h2>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="input-wrapper">
          <ion-item lines="none">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-input
              formControlName="email"
              type="email"
              placeholder="Email professionnel"
            ></ion-input>
          </ion-item>
        </div>

        <div class="input-wrapper">
          <ion-item lines="none">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Mot de passe (min. 14 car.)"
            ></ion-input>
            <ion-icon
              [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
              slot="end"
              (click)="togglePassword()"
              style="cursor: pointer; opacity: 0.5"
            ></ion-icon>
          </ion-item>
          <div
            class="validation-hint"
            *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors"
          >
            <small *ngIf="loginForm.get('password')?.errors?.['required']"
              >Le mot de passe est requis</small
            >
            <small *ngIf="loginForm.get('password')?.errors?.['minlength']"
              >Minimum 14 caractères</small
            >
            <small *ngIf="loginForm.get('password')?.errors?.['pattern']"
              >Majuscule, minuscule et chiffre requis</small
            >
          </div>
        </div>

        <ion-button
          expand="block"
          type="submit"
          [disabled]="isLoading"
          class="btn-login"
        >
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
          <span *ngIf="!isLoading">Se connecter</span>
        </ion-button>
      </form>
    </div>

    <!-- Minimal Footer -->
    <div class="university-footer animate-fade-in">
      <p>© 2026 Université du Mali</p>
    </div>
  </div>
</ion-content>
