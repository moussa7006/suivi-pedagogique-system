<ion-content class="login-content" [fullscreen]="true">
  <div class="login-container">
    <!-- Branding Section -->
    <div class="brand-section animate-fade-in">
      <div class="logo-container">
        <ion-icon name="shield-checkmark-outline"></ion-icon>
      </div>
      <h1>Mise à jour</h1>
      <p *ngIf="forced" class="forced-message">
        Votre premier mot de passe doit être remplacé avant de continuer.
      </p>
      <p *ngIf="!forced">Changer votre mot de passe</p>
    </div>

    <!-- Glass Form Card -->
    <div class="form-card animate-slide-up">
      <div class="form-header">
        <h2>Sécurité 🔒</h2>
      </div>

      <form (ngSubmit)="submit()">
        <div class="input-wrapper">
          <ion-item lines="none">
            <ion-icon name="key-outline" slot="start"></ion-icon>
            <ion-input
              name="currentPassword"
              [(ngModel)]="currentPassword"
              type="password"
              placeholder="Ancien mot de passe"
            ></ion-input>
          </ion-item>
        </div>

        <div class="input-wrapper">
          <ion-item lines="none">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              name="newPassword"
              [(ngModel)]="newPassword"
              type="password"
              placeholder="Nouveau mot de passe"
            ></ion-input>
          </ion-item>
          <div class="validation-hint">
            <small>Min 14 car., maj, min, chiffre, symbole.</small>
          </div>
        </div>

        <div class="input-wrapper">
          <ion-item lines="none">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              name="confirmPassword"
              [(ngModel)]="confirmPassword"
              type="password"
              placeholder="Confirmer mot de passe"
            ></ion-input>
          </ion-item>
        </div>

        <ion-button
          expand="block"
          type="submit"
          [disabled]="isLoading"
          class="btn-login"
        >
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
          <span *ngIf="!isLoading">Enregistrer</span>
        </ion-button>
      </form>

      <!-- Optionally show back button if not forced -->
      <ion-button *ngIf="!forced" fill="clear" size="small" routerLink="/tabs">
        <ion-icon name="arrow-back-outline" slot="start"></ion-icon>
        Retour
      </ion-button>
    </div>

    <!-- Minimal Footer -->
    <div class="university-footer animate-fade-in">
      <p>© 2026 Université du Mali</p>
    </div>
  </div>
</ion-content>
