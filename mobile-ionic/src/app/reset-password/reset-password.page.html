<ion-content class="login-content" [fullscreen]="true">
  <div class="login-container">
    <!-- Branding Section -->
    <div class="brand-section animate-fade-in">
      <div class="logo-container">
        <ion-icon name="lock-closed-outline"></ion-icon>
      </div>
      <h1>Nouveau mot de passe</h1>
      <p>Créez un nouveau mot de passe sécurisé</p>
    </div>

    <!-- Glass Form Card -->
    <div class="form-card animate-slide-up">
      <div class="form-header">
        <h2>Sécurisation 🛡️</h2>
      </div>

      <form (ngSubmit)="submit()">
        <div class="input-wrapper">
          <ion-item lines="none">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-input
              name="email"
              [(ngModel)]="email"
              type="email"
              placeholder="Email professionnel"
            ></ion-input>
          </ion-item>
        </div>

        <div class="input-wrapper">
          <ion-item lines="none">
            <ion-icon name="keypad-outline" slot="start"></ion-icon>
            <ion-input
              name="code"
              [(ngModel)]="code"
              inputmode="numeric"
              maxlength="6"
              placeholder="Code à 6 chiffres"
            ></ion-input>
          </ion-item>
        </div>

        <div class="input-wrapper">
          <ion-item lines="none">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              name="newPassword"
              [(ngModel)]="newPassword"
              type="password"
              placeholder="Nouveau mot de passe"
            ></ion-input>
          </ion-item>
          <div class="validation-hint">
            <small>Min 14 car., maj, min, chiffre, symbole.</small>
          </div>
        </div>

        <div class="input-wrapper">
          <ion-item lines="none">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              name="confirmPassword"
              [(ngModel)]="confirmPassword"
              type="password"
              placeholder="Confirmer mot de passe"
            ></ion-input>
          </ion-item>
        </div>

        <ion-button
          expand="block"
          type="submit"
          [disabled]="isLoading"
          class="btn-login"
        >
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
          <span *ngIf="!isLoading">Réinitialiser</span>
        </ion-button>
      </form>

      <ion-button fill="clear" size="small" routerLink="/forgot-password">
        Recevoir un nouveau code
      </ion-button>
      <ion-button
        fill="clear"
        size="small"
        type="button"
        (click)="goToLogin()"
        class="back-login-btn"
      >
        <ion-icon name="arrow-back-outline" slot="start"></ion-icon>
        Retour à la connexion
      </ion-button>
    </div>

    <!-- Minimal Footer -->
    <div class="university-footer animate-fade-in">
      <p>© 2026 Université du Mali</p>
    </div>
  </div>
</ion-content>
