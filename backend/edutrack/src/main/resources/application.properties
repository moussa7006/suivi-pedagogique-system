spring.application.name=edutrack
server.port=8099
server.forward-headers-strategy=framework
spring.datasource.url=jdbc:postgresql://localhost:5432/db_suivipedago
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Géolocalisation de l'émargement.
# En développement, le contrôle de distance est désactivé pour éviter les blocages
# si les coordonnées exactes de l'école ne sont pas encore configurées.
emargement.geolocation.enabled=false
emargement.geolocation.school-latitude=12.6392
emargement.geolocation.school-longitude=-8.0029
emargement.geolocation.max-distance-km=0.5
