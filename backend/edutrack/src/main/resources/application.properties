spring.application.name=edutrack
server.port=${SERVER_PORT:8099}
server.forward-headers-strategy=framework

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/db_suivipedago}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8100,http://192.168.*:*,https://*.relais.dev,http://*.relais.dev}
app.seed-admin.enabled=${APP_SEED_ADMIN_ENABLED:true}
app.seed-admin.reset-existing=${APP_SEED_ADMIN_RESET_EXISTING:true}
app.seed-admin.email=${APP_SEED_ADMIN_EMAIL:admin@edutrack.local}
app.seed-admin.password=${APP_SEED_ADMIN_PASSWORD:ChangeMe123456!}
app.seed-admin.nom=${APP_SEED_ADMIN_NOM:ADMIN}
app.seed-admin.prenom=${APP_SEED_ADMIN_PRENOM:EduTrack}
app.seed-admin.matricule=${APP_SEED_ADMIN_MATRICULE:2026-ADM-001}
app.seed-admin.telephone=${APP_SEED_ADMIN_TELEPHONE:}
app.seed-admin.adresse=${APP_SEED_ADMIN_ADRESSE:}
app.jwt.secret=${APP_JWT_SECRET:edutrack_secret_key_for_jwt_authentication_2024_minimum_32_chars}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
