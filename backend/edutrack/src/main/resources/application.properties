spring.application.name=edutrack
server.port=8099
server.forward-headers-strategy=framework
spring.datasource.url=jdbc:postgresql://localhost:5432/db_suivipedago
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Email SMTP Gmail pour l'envoi des codes de réinitialisation.
# Définir ces variables dans l'environnement, ne pas stocker de secret dans Git.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Géolocalisation de l'émargement.
# En développement, le contrôle de distance est désactivé pour éviter les blocages
# si les coordonnées exactes de l'école ne sont pas encore configurées.
emargement.geolocation.enabled=false
emargement.geolocation.school-latitude=12.6392
emargement.geolocation.school-longitude=-8.0029
emargement.geolocation.max-distance-km=0.5
