spring.application.name=edutrack
server.port=8099
server.forward-headers-strategy=framework
spring.datasource.url=jdbc:postgresql://localhost:5432/db_suivipedago
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# JWT de développement. Utiliser une valeur secrète forte en production.
app.jwt.secret=dev-edutrack-jwt-secret-key-32-bytes-minimum-2026
app.jwt.expiration-ms=86400000

# Compte administrateur de développement.
app.seed-admin.enabled=true
app.seed-admin.reset-existing=true
app.seed-admin.email=moussa.b.keita223@gmail.com
app.seed-admin.password=Admin123456789!
app.seed-admin.nom=KEITA
app.seed-admin.prenom=Moussa Balla
app.seed-admin.matricule=2026-ADM-001
app.seed-admin.telephone=70 06 01 45
app.seed-admin.adresse=Bacodjicoroni ACI

# Email SMTP Gmail pour l'envoi des codes de réinitialisation.
# Définir ces variables dans l'environnement, ne pas stocker de secret dans Git.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Géolocalisation de l'émargement.
# En développement, le contrôle de distance est désactivé pour éviter les blocages
# si les coordonnées exactes de l'école ne sont pas encore configurées.
emargement.geolocation.enabled=false
emargement.geolocation.school-latitude=12.6392
emargement.geolocation.school-longitude=-8.0029
emargement.geolocation.max-distance-km=0.5

# JWT
app.jwt.secret=${JWT_SECRET:edutrack-dev-jwt-secret-change-me-please-32-bytes-minimum}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Compte administrateur initial (seed)
app.seed-admin.enabled=${SEED_ADMIN_ENABLED:false}
app.seed-admin.reset-existing=${SEED_ADMIN_RESET_EXISTING:false}
app.seed-admin.email=${SEED_ADMIN_EMAIL:admin@edutrack.local}
app.seed-admin.password=${SEED_ADMIN_PASSWORD:Admin1234!}
app.seed-admin.nom=${SEED_ADMIN_NOM:Administrateur}
app.seed-admin.prenom=${SEED_ADMIN_PRENOM:EduTrack}
app.seed-admin.matricule=${SEED_ADMIN_MATRICULE:ADMIN-001}
app.seed-admin.telephone=${SEED_ADMIN_TELEPHONE:00000000}
app.seed-admin.adresse=${SEED_ADMIN_ADRESSE:EduTrack}
