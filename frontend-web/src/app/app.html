<div
  class="layout-wrapper"
  [class.authenticated]="authService.isLoggedIn()"
  [class.login-layout]="isLoginPage"
>
  <!-- Sidebar : Uniquement si connecté -->
  <app-sidebar
    *ngIf="authService.isLoggedIn()"
    [isMobileMenuOpen]="isMobileMenuOpen"
    (mobileMenuClosed)="isMobileMenuOpen = false"
  >
  </app-sidebar>

  <main class="layout-main">
    <!-- Topbar : Uniquement si connecté -->
    <header class="app-header" *ngIf="authService.isLoggedIn()">
      <div class="header-left">
        <button class="mobile-toggle" (click)="toggleMobileMenu()">
          <i class="pi pi-bars"></i>
        </button>
        <div class="page-context">
          <span class="breadcrumb">EduTrack / Dashboard</span>
        </div>
      </div>

      <div class="header-right">
        <button class="icon-btn">
          <i class="pi pi-bell"></i>
          <span class="dot"></span>
        </button>

        <div class="divider"></div>

        <div class="profile-menu-wrapper" (click)="$event.stopPropagation()">
          <button
            class="user-pill"
            type="button"
            [class.open]="isProfileMenuOpen"
            (click)="toggleProfileMenu($event)"
            aria-label="Ouvrir le menu profil administrateur"
          >
            <ng-container *ngIf="adminPhotoUrl; else topbarInitials">
              <img
                class="avatar-photo"
                [src]="adminPhotoUrl"
                alt="Photo de profil administrateur"
              />
            </ng-container>
            <ng-template #topbarInitials>
              <div class="avatar-initials">{{ adminInitials }}</div>
            </ng-template>
            <div class="user-meta">
              <span class="name">{{ adminName }}</span>
              <span class="role">{{ adminRole }}</span>
            </div>
            <i class="pi pi-chevron-down" [class.rotate]="isProfileMenuOpen"></i>
          </button>

          <div class="profile-dropdown" *ngIf="isProfileMenuOpen">
            <div class="dropdown-header">
              <ng-container *ngIf="adminPhotoUrl; else dropdownInitials">
                <img
                  class="avatar-photo large"
                  [src]="adminPhotoUrl"
                  alt="Photo de profil administrateur"
                />
              </ng-container>
              <ng-template #dropdownInitials>
                <div class="avatar-initials large">{{ adminInitials }}</div>
              </ng-template>
              <div>
                <strong>{{ adminName }}</strong>
                <span>{{ adminRole }}</span>
              </div>
            </div>

            <button class="dropdown-item" type="button" (click)="goToProfile()">
              <i class="pi pi-user"></i>
              Voir mon profil
            </button>

            <button class="dropdown-item" type="button" (click)="goToProfile()">
              <i class="pi pi-camera"></i>
              Changer la photo
            </button>

            <button class="dropdown-item muted" type="button" disabled>
              <i class="pi pi-key"></i>
              Changer le mot de passe
            </button>

            <button class="dropdown-item danger" type="button" (click)="logout()">
              <i class="pi pi-sign-out"></i>
              Déconnexion
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Zone de contenu -->
    <div class="layout-content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
